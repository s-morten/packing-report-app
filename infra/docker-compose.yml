services:
  postgres:
    image: postgres:17-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api/app:/app/app
      - ../apps/api/alembic:/app/alembic
      - ../apps/api/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    command: ["uv", "run", "python", "-m", "app.modules.odds.worker"]
    env_file: .env
    volumes:
      - ../apps/api/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../.
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../packages/shared:/app/packages/shared
    depends_on:
      - api

volumes:
  pgdata:
